name: SEO Data Scheduler

on:
  schedule:
    - cron: '0 4 * * 1,3,5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-seo-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install httpx supabase python-dotenv

      - name: Run SEO scheduler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          AHREFS_API_TOKEN: ${{ secrets.AHREFS_API_TOKEN }}
        run: |
          python seo_scheduler.py

      - name: Notify on failure
        if: failure()
        run: echo "SEO Scheduler fejlede — tjek logs ovenfor"
